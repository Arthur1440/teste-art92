<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#10120f">
  <title>Caça-Luzes AR</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game-shell">
    <video id="camera" autoplay muted playsinline></video>
    <canvas id="game"></canvas>

    <header class="hud">
      <div><small>PONTOS</small><strong id="score">0</strong></div>
      <div class="title">CAÇA-LUZES</div>
      <div><small>TEMPO</small><strong id="time">30</strong></div>
    </header>

    <section id="intro" class="panel">
      <span class="eyebrow">MINIJOGO AR</span>
      <h1>Incline. Mire. Capture.</h1>
      <p>Use a câmera como cenário e incline o iPhone para levar a mira até as luzes.</p>
      <button id="startButton">Iniciar jogo</button>
      <p id="status" class="status">Abra diretamente no Safari.</p>
    </section>

    <section id="gameOver" class="panel hidden">
      <span class="eyebrow">FIM DE JOGO</span>
      <h2><span id="finalScore">0</span> pontos</h2>
      <p id="resultText">Nada mal para um humano girando um retângulo de vidro.</p>
      <button id="restartButton">Jogar novamente</button>
    </section>

    <div class="crosshair" id="crosshair" aria-hidden="true"><i></i></div>
    <div class="hint" id="hint">Incline o aparelho para mover a mira</div>
  </main>
  <script src="script.js"></script>
</body>
</html>
