<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#040713">
  <title>Space Attacker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game-shell">
    <canvas id="game"></canvas>

    <header class="hud">
      <div><small>PONTOS</small><strong id="score">0</strong></div>
      <div class="title">SPACE ATTACKER</div>
      <div><small>VIDAS</small><strong id="lives">3</strong></div>
    </header>

    <section id="intro" class="panel">
      <span class="eyebrow">JOGO COM SENSORES</span>
      <h1>Defenda o planeta.</h1>
      <p>Incline o iPhone para pilotar a nave. Os disparos são automáticos. Destrua as ondas inimigas e desvie dos tiros.</p>
      <button id="startButton">Ativar sensores e jogar</button>
      <p id="status" class="status">Use o Safari e mantenha o aparelho na vertical.</p>
    </section>

    <section id="gameOver" class="panel hidden">
      <span class="eyebrow" id="endLabel">FIM DE JOGO</span>
      <h2 id="endTitle">0 pontos</h2>
      <p id="endText"></p>
      <button id="restartButton">Jogar novamente</button>
    </section>

    <div id="message" class="message">Incline o iPhone para mover a nave</div>
  </main>
  <script src="script.js"></script>
</body>
</html>
